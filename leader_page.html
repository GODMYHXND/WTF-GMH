<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINTERFELL GODMYHXND - OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- SECURITY & RESET --- */
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-user-drag: none; }
        body, html { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; }
        .snow { position: fixed; top: -10px; color: #fff; pointer-events: none; z-index: 5; }

        /* --- NAVIGATION & UI --- */
        .home-trigger { position: fixed; top: 20px; right: 20px; z-index: 2000; cursor: pointer; opacity: 0.5; transition: 0.3s; color: #fff; font-size: 1.5rem; }
        .home-trigger:hover { opacity: 1; transform: scale(1.1); color: #3498db; }
        .admin-trigger { position: fixed; bottom: 30px; left: 20px; z-index: 2000; cursor: pointer; opacity: 0.1; transition: 0.5s; color: #fff; font-size: 1.5rem; }
        .admin-trigger:hover { opacity: 1; transform: rotate(90deg); }

        #addBtn { 
            position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; 
            background: #2ecc71; color: white; border-radius: 50%; border: none; 
            font-size: 30px; cursor: pointer; display: none; z-index: 1000; 
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4); transition: 0.3s; 
            align-items: center; justify-content: center;
        }
        #addBtn:hover { transform: scale(1.1) rotate(90deg); background: #27ae60; }

        #adminStatusBadge { position: fixed; top: 20px; left: 20px; z-index: 2001; background: rgba(46, 204, 113, 0.15); color: #2ecc71; padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(46, 204, 113, 0.3); font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; display: none; backdrop-filter: blur(10px); transition: 0.3s; align-items: center; gap: 8px; }
        #adminStatusBadge:hover { background: rgba(46, 204, 113, 0.25); transform: translateY(3px); }

        .header-nav { width: 100%; background-color: #0a0a0a; padding: 30px 0; border-bottom: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; }
        .slogan { color: #555; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 5px; margin-top: 8px; }
        
        .member-title-section { text-align: center; padding: 60px 20px 0; }
        .member-title-section h2 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; background: linear-gradient(to bottom, #ffffff 40%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        .search-container { max-width: 500px; margin: 30px auto; padding: 0 20px; }
        #searchBar { width: 100%; padding: 18px; background: #0d0d0d; border: 1px solid #222; border-radius: 12px; color: #fff; text-align: center; outline: none; transition: 0.3s; font-size: 1rem; }
        #searchBar:focus { border-color: #444; background: #111; box-shadow: 0 0 15px rgba(255,255,255,0.05); }

        /* --- GRID & MEMBER CARD ANIMATION --- */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 40px 50px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .member-card { 
            position: relative; background: linear-gradient(145deg, #0f0f0f, #050505); 
            border: 1px solid #1a1a1a; border-radius: 24px; padding: 45px 25px; 
            text-align: center; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden; min-height: 420px;
            animation: fadeInUp 0.6s ease backwards; 
        }

        .member-card:hover { border-color: #444; transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }

        .admin-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 20; }
        .del-btn, .edit-btn { width: 35px; height: 35px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .del-btn { background: rgba(255, 68, 68, 0.1); color: #ff4444; }
        .del-btn:hover { background: #ff4444; color: #fff; }
        .edit-btn { background: rgba(52, 152, 219, 0.1); color: #3498db; }
        .edit-btn:hover { background: #3498db; color: #fff; }

        .img-wrapper { width: 130px; height: 130px; margin: 0 auto 25px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, #333, #000); transition: 0.5s; }
        .img-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #000; }
        .member-card:hover .img-wrapper { transform: scale(1.1) rotate(5deg); }

        .name-text { 
            font-size: 1.35rem; font-weight: 800; margin-bottom: 20px; width: 210px; overflow: hidden; 
            white-space: nowrap; position: relative; display: flex;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .name-text span {
            display: inline-block; padding-right: 50px; flex-shrink: 0;
            background: linear-gradient(120deg, #ffffff 30%, #a5d6f7 45%, #ffffff 50%, #a5d6f7 55%, #ffffff 70%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .member-card:hover .name-text span { animation: marquee 6s linear infinite; }

        .fb-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: #1877F2; color: white !important; text-decoration: none; padding: 12px 30px; border-radius: 30px; font-size: 0.9rem; font-weight: 700; transition: 0.3s; width: 85%; margin-top: auto; }
        .fb-btn:hover { background: #1565c0; transform: scale(1.05); }

        /* --- MODAL ANIMATION --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        
        @keyframes modalPop {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content { 
            background: #0d0d0d; padding: 40px; border-radius: 30px; 
            border: 1px solid #222; width: 90%; max-width: 400px; text-align: center; 
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-content input { width: 100%; padding: 15px; margin: 10px 0; background: #151515; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; transition: 0.3s; }
        .modal-content input:focus { border-color: #3498db; background: #1a1a1a; }
        
        .action-btn { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 800; margin-top: 15px; text-transform: uppercase; transition: 0.3s; }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        
        .danger-border { border-top: 5px solid #ff4444; }
        .cancel-link { display: block; margin-top: 20px; color: #555; cursor: pointer; font-size: 0.85rem; text-decoration: none; transition: 0.3s; }
        .cancel-link:hover { color: #888; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 40px 0 80px; position: relative; z-index: 100; }
        .page-btn { background: #0a0a0a; border: 1px solid #222; color: #777; padding: 12px 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .page-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="adminStatusBadge" onclick="openLogoutModal()">
        <i class="fas fa-user-shield"></i> EDITING MODE
    </div>

    <div class="home-trigger" onclick="window.location.href='index.html'">
        <i class="fas fa-home"></i>
    </div>

    <div class="admin-trigger" id="loginToggleBtn" onclick="openLoginModal()">
        <i class="fas fa-cog"></i>
    </div>

    <header class="header-nav">
        <div class="brand">WINTERFELL GODMYHXND</div>
        <div class="slogan">NEVERBROKE IN WINTERFELL</div>
    </header>

    <div class="member-title-section">
        <h2>Leader</h2> <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search by name..." onkeyup="handleSearch()">
        </div>
    </div>

    <button id="addBtn" onclick="openAddModal()">+</button>

    <div id="loginModal" class="modal"><div class="modal-content"><h3>ADMIN ACCESS</h3><input type="text" id="loginUser" placeholder="Username"><input type="password" id="loginPass" placeholder="Password"><button class="action-btn" onclick="checkAuth()">Login</button><span class="cancel-link" onclick="closeModal('loginModal')">Close</span></div></div>
    
    <div id="logoutModal" class="modal"><div class="modal-content danger-border"><h3>LOGOUT SESSION?</h3><p style="color:#777;">ออกจากโหมดแก้ไขใช่หรือไม่?</p><button class="action-btn" style="background:#ff4444; color:#fff;" onclick="logout()">LOGOUT</button><button class="action-btn" style="background:#222; color:#fff;" onclick="closeModal('logoutModal')">CANCEL</button></div></div>
    
    <div id="deleteModal" class="modal"><div class="modal-content danger-border"><i class="fas fa-exclamation-triangle" style="color:#ff4444; font-size: 2.5rem; margin-bottom: 15px;"></i><h3>CONFIRM DELETE?</h3><p id="deleteMemberName" style="color:#fff; font-weight: bold;"></p><input type="hidden" id="deleteTargetId"><button class="action-btn" style="background:#ff4444; color:#fff;" onclick="confirmDelete()">DELETE NOW</button><button class="action-btn" style="background:#222; color:#fff;" onclick="closeModal('deleteModal')">CANCEL</button></div></div>
    
    <div id="memberModal" class="modal"><div class="modal-content"><h3 id="modalTitle" style="letter-spacing: 2px;">LEADER INFO</h3><input type="hidden" id="mId"><input type="text" id="mName" placeholder="ชื่อ Leader"><input type="text" id="mFB" placeholder="ลิงก์ Facebook"><input type="text" id="mImg" placeholder="ลิงก์รูปภาพ (URL)"><button class="action-btn" id="saveBtn" style="background:#2ecc71; color:#fff;" onclick="saveMember()">Save Leader</button><span class="cancel-link" onclick="closeModal('memberModal')">Cancel</span></div></div>

    <div class="grid-container" id="memberGrid"></div>
    <div class="pagination" id="pagination"></div>

    <script>
        // --- SECURITY ---
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
        };

        // --- CORE LOGIC ---
        const _0xU = "QWRtaW4="; 
        const _0xP = "R09ETVlIWE5EV1RG"; 
        
        // ใช้ชื่อ DB เดิมเพื่อให้ข้อมูลยังคงอยู่ แต่เปลี่ยนการแสดงผลเป็น Leader
        let members = JSON.parse(localStorage.getItem('winterfell_leader_db')) || [];
        let isAdmin = false;
        const cardsPerPage = 12;
        let currentPage = 1;

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function openLogoutModal() { document.getElementById('logoutModal').style.display = 'flex'; }
        function logout() { localStorage.removeItem("adminMode"); location.reload(); }

        function checkAuth() {
            if (btoa(document.getElementById('loginUser').value) === _0xU && btoa(document.getElementById('loginPass').value) === _0xP) {
                localStorage.setItem("adminMode", "true");
                location.reload();
            } else { alert("DENIED."); }
        }

        function createCardHTML(m, index) {
            const delay = (index % cardsPerPage) * 0.05;
            return `
                <div class="member-card" style="animation-delay: ${delay}s">
                    ${isAdmin ? `
                        <div class="admin-controls">
                            <button class="edit-btn" onclick="openEditModal(${m.id})"><i class="fas fa-edit"></i></button>
                            <button class="del-btn" onclick="openDeleteModal(${m.id}, '${m.name}')"><i class="fas fa-trash"></i></button>
                        </div>` : ''}
                    <div class="img-wrapper"><img src="${m.img}" onerror="this.src='https://via.placeholder.com/120'"></div>
                    <div class="name-text">
                        <span>${m.name}</span>
                        <span>${m.name}</span>
                    </div>
                    <a href="${m.fb}" target="_blank" class="fb-btn"><i class="fab fa-facebook"></i> Facebook</a>
                </div>`;
        }

        function render() {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = "";
            const start = (currentPage - 1) * cardsPerPage;
            const paginatedMembers = members.slice(start, start + cardsPerPage);
            paginatedMembers.forEach((m, i) => { grid.innerHTML += createCardHTML(m, i); });
            updatePagination();
        }

        function handleSearch() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('memberGrid');
            const pagin = document.getElementById('pagination');
            if (val === "") { render(); pagin.style.display = 'flex'; } 
            else {
                grid.innerHTML = "";
                members.filter(m => m.name.toLowerCase().includes(val)).forEach((m, i) => { grid.innerHTML += createCardHTML(m, i); });
                pagin.style.display = 'none';
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "ADD NEW LEADER";
            document.getElementById('mId').value = "";
            document.getElementById('mName').value = "";
            document.getElementById('mFB').value = "";
            document.getElementById('mImg').value = "";
            document.getElementById('memberModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const m = members.find(item => item.id === id);
            document.getElementById('modalTitle').innerText = "EDIT LEADER";
            document.getElementById('mId').value = m.id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mFB').value = m.fb;
            document.getElementById('mImg').value = m.img;
            document.getElementById('memberModal').style.display = 'flex';
        }

        function saveMember() {
            const id = document.getElementById('mId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('mName').value,
                fb: document.getElementById('mFB').value,
                img: document.getElementById('mImg').value || "https://via.placeholder.com/120"
            };
            if (!data.name || !data.fb) return alert("กรุณากรอกข้อมูลให้ครบ");
            if (id) {
                const index = members.findIndex(m => m.id === data.id);
                members[index] = data;
            } else { members.unshift(data); }
            localStorage.setItem('winterfell_leader_db', JSON.stringify(members));
            render();
            closeModal('memberModal');
        }

        function openDeleteModal(id, name) {
            document.getElementById('deleteTargetId').value = id;
            document.getElementById('deleteMemberName').innerText = `Name: ${name}`;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function confirmDelete() {
            const id = parseInt(document.getElementById('deleteTargetId').value);
            members = members.filter(m => m.id !== id);
            localStorage.setItem('winterfell_leader_db', JSON.stringify(members));
            closeModal('deleteModal');
            render();
        }

        function updatePagination() {
            const count = Math.ceil(members.length / cardsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = "";
            if (count <= 1) return;
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
        }

        function goToPage(p) { currentPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        if (localStorage.getItem("adminMode") === "true") {
            isAdmin = true;
            document.getElementById('addBtn').style.display = 'flex';
            document.getElementById('loginToggleBtn').style.display = 'none';
            document.getElementById('adminStatusBadge').style.display = 'flex';
        }

        function createSnow() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄'; snow.className = 'snow';
            snow.style.left = Math.random() * window.innerWidth + 'px';
            snow.style.fontSize = Math.random() * 10 + 10 + 'px';
            snow.style.opacity = Math.random();
            document.body.appendChild(snow);
            const anim = snow.animate([{ transform: 'translateY(0)' }, { transform: 'translateY(105vh)', opacity: 0 }], { duration: 5000 + Math.random() * 3000 });
            anim.onfinish = () => snow.remove();
        }
        setInterval(createSnow, 400);
        render();
    </script>
</body>
</html>
